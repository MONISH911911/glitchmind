<!DOCTYPE html>
<html>
<head>
  <title>GlitchMind</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
      color: white;
    }

    canvas {
      display: block;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      z-index: 2;
    }

    /* 🔘 Start Button */
    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 24px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      z-index: 3;
    }

    #startBtn:hover {
      background: red;
      color: white;
    }

    /* 🩸 Game Over Overlay (optional visual layer) */
    #overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 1;
    }
  </style>
</head>

<body>

<div id="overlay"></div>

<div id="score">Score: 0</div>

<button id="startBtn">START</button>

<canvas id="gameCanvas"></canvas>

<script src="game.js"></script>

</body>
</html>
